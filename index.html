<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Neon Clock</title>

<!-- NEW FONT -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0a0a12;
  overflow: hidden;
  font-family: Arial;
}

/* 🌌 background dots */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,0,150,0.12) 2px, transparent 3px);
  background-size: 50px 50px;
  animation: bgMove 10s linear infinite;
}

/* 🌈 floating glow blobs */
body::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,0,150,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,255,229,0.2), transparent 40%),
    radial-gradient(circle at 50% 90%, rgba(120,75,160,0.2), transparent 40%);
  animation: floatBg 10s ease-in-out infinite alternate;
}

@keyframes bgMove {
  from { transform: translateY(0px); }
  to { transform: translateY(50px); }
}

@keyframes floatBg {
  from { transform: translate(0,0) scale(1); }
  to { transform: translate(30px,-30px) scale(1.1); }
}

/* 💎 clock box */
.clock {
  position: relative;
  padding: 40px 80px;
  border-radius: 25px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 0 40px rgba(255,0,150,0.2);
  z-index: 2;
  transition: 0.3s;
}

.clock:hover {
  transform: scale(1.1);
}

/* 🔥 TIME FONT UPDATED */
.time {
  font-size: 110px;
  font-weight: 700;
  font-family: 'Orbitron', sans-serif;  /* NEW FONT */
  background: linear-gradient(90deg, #ff00aa, #ff3cac, #ff66cc, #ff1493);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 25px rgba(255,0,150,0.5);
}

/* AM PM */
.ampm {
  font-size: 25px;
  color: white;
  margin-left: 15px;
  text-shadow: 0 0 10px #fff;
}

/* glow */
.clock::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 25px;
  background: linear-gradient(45deg, #ff00aa, #ff3cac, #ff66cc);
  opacity: 0.25;
  filter: blur(35px);
  z-index: -1;
  animation: glow 3s infinite alternate;
}

@keyframes glow {
  from { transform: scale(1); opacity: 0.2; }
  to { transform: scale(1.1); opacity: 0.5; }
}

/* ✨ PARTICLES */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: rgba(255, 0, 150, 0.8);
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(255,0,150,0.8);
  animation: floatUp 6s linear infinite;
  z-index: 0;
}

@keyframes floatUp {
  0% {
    transform: translateY(100vh) scale(0.5);
    opacity: 0;
  }
  50% { opacity: 1; }
  100% {
    transform: translateY(-10vh) scale(1.2);
    opacity: 0;
  }
}

</style>
</head>

<body>

<div class="clock">
  <span class="time" id="time">00:00:00</span>
  <span class="ampm" id="ampm">AM</span>
</div>

<script>

/* CLOCK */
function updateClock() {
  const now = new Date();

  let h = now.getHours();
  let m = now.getMinutes();
  let s = now.getSeconds();

  let ampm = h >= 12 ? "PM" : "AM";

  h = h % 12 || 12;

  h = h < 10 ? "0" + h : h;
  m = m < 10 ? "0" + m : m;
  s = s < 10 ? "0" + s : s;

  document.getElementById("time").innerText = `${h}:${m}:${s}`;
  document.getElementById("ampm").innerText = ampm;
}

setInterval(updateClock, 1000);
updateClock();

/* PARTICLES */
function createParticles() {
  for (let i = 0; i < 30; i++) {
    let p = document.createElement("div");
    p.className = "particle";

    p.style.left = Math.random() * window.innerWidth + "px";
    p.style.animationDuration = (Math.random() * 3 + 3) + "s";
    p.style.opacity = Math.random();

    document.body.appendChild(p);
  }
}

createParticles();

</script>

</body>
</html>
